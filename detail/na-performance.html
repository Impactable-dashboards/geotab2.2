.gna{--bg:#0a0a0c;--panel:#141417;--panel2:#1b1b1f;--line:#2a2a30;--ink:#f4f4f6;--mut:#8a8a95;--mut2:#6a6a73;
  background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,system-ui,sans-serif;font-size:14px;padding:26px;border-radius:14px}
.gna h1{font-size:15px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 2px}
.gna .sub{color:var(--mut);font-size:12px;margin-bottom:20px}
.gna .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px}
.gna .ptitle{font-size:14px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin:0 0 3px}
.gna .pdesc{color:var(--mut);font-size:12px;margin-bottom:18px}
.gna .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.gna .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.gna .kpi .lab{color:var(--mut);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.gna .kpi .val{font-family:ui-monospace,Menlo,monospace;font-size:30px;font-weight:700;margin:6px 0 2px}
.gna .kpi .note{color:var(--mut);font-size:11px}
.gna .mix{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.gna .stage{border-radius:12px;padding:18px;border:1px solid var(--line)}
.gna .stage.tof{border-color:#5a4a25;background:linear-gradient(180deg,rgba(245,166,35,.10),transparent)}
.gna .stage.mof{border-color:#1e4a6b;background:linear-gradient(180deg,rgba(58,160,255,.10),transparent)}
.gna .stage.bof{border-color:#2f5a1e;background:linear-gradient(180deg,rgba(111,191,58,.10),transparent)}
.gna .stage .top{display:flex;justify-content:space-between;align-items:baseline}
.gna .stage .nm{font-family:ui-monospace,Menlo,monospace;font-weight:700;font-size:15px}
.gna .stage .pct{font-family:ui-monospace,Menlo,monospace;font-size:30px;font-weight:700}
.gna .stage .l1{color:var(--mut);font-size:12px;margin:8px 0 2px;font-family:ui-monospace,Menlo,monospace}
.gna .stage .l2{color:var(--mut2);font-size:12px;font-family:ui-monospace,Menlo,monospace}
.gna table{width:100%;border-collapse:collapse;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
.gna th{color:var(--mut);text-align:right;font-weight:500;padding:8px 10px;border-bottom:1px solid var(--line);font-size:11px}
.gna th.l,.gna td.l{text-align:left}
.gna td{padding:9px 10px;border-bottom:1px solid #202024;text-align:right;color:#d9d9de}
.gna td.l{color:var(--ink);font-family:Arial,sans-serif;font-size:12.5px;max-width:300px}
.gna .pill{display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;font-family:ui-monospace,Menlo,monospace}
.gna .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.gna .seg{margin-bottom:16px}
.gna .seg h4{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:0 0 8px;display:flex;align-items:center;gap:8px}
.gna .dot{width:9px;height:9px;border-radius:2px;display:inline-block}
.gna .idle{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gna .idlecard{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
.gna .idlecard .t{font-size:12.5px;font-weight:600}
.gna .idlecard .d{color:var(--mut);font-size:11px;font-family:ui-monospace,Menlo,monospace;margin-top:2px}
.gna .flag{border-left:3px solid #e5564e;background:var(--panel2);border-radius:9px;padding:14px 16px;font-size:12.5px;color:#cfcfd6;margin-top:12px}
.gna .foot{border-left:3px solid #3aa0ff;background:var(--panel2);border-radius:9px;padding:14px 16px;font-size:12.5px;color:#cfcfd6}
.gna .caveat{color:var(--mut2);font-size:11px;margin-top:14px;line-height:1.6}
.gna .ph{border:1px dashed var(--line);border-radius:12px;padding:40px;text-align:center;color:var(--mut2);font-size:12.5px}
.gna .mom{font-size:9.5px;letter-spacing:.5px;white-space:nowrap;margin-left:2px}
.gna .mom .ms{color:var(--mut2);margin:0 1px}
.gna .legend{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:11.5px;color:var(--mut);line-height:1.7;margin-top:12px}
.gna .legend .pair{margin:0 9px 0 3px;white-space:nowrap}
.gna .legend b{color:#cfcfd6;font-weight:600}
@media(max-width:900px){.gna .kpis,.gna .mix,.gna .cols,.gna .idle{grid-template-columns:1fr 1fr}}
